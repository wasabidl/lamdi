name: Build Debug APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # FIX: We force the machine to use Gradle 8.8 instead of 9.4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8

      # This creates the missing wrapper files correctly using version 8.8
      - name: Force Generate Wrapper
        run: gradle wrapper --gradle-version 8.8
        working-directory: frontend/android

      - name: Build APK
        # We go back to using ./gradlew now that the wrapper is fixed
        run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: frontend/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
