name: Build Debug APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # This line fixes the "No such file" error by creating it manually
      - name: Force Generate Wrapper
        run: gradle wrapper

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          # The "**" tells GitHub to search all folders for the APK
          path: "**/build/outputs/apk/debug/*.apk"
