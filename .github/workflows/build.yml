name: Build Debug APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Using Node 18 for better stability with older Expo
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # STEP 1: Delete the potentially broken android folder from the ZIP
      - name: Clean Old Android Files
        run: rm -rf android
        working-directory: frontend

      # STEP 2: Let Expo generate a fresh, working android folder
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        working-directory: frontend

      # STEP 3: Bundle JavaScript so the APK is self-contained (no Metro server needed)
      - name: Bundle JavaScript for Android
        working-directory: frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: https://lamdi.onrender.com
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file expo-router/entry \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      # STEP 4: Setup the build tool (Gradle 8.6 is the most stable for this)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Build APK
        # We use the new gradlew created by the 'prebuild' command
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        working-directory: frontend/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/build/outputs/apk/debug/*.apk"
